<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA V3 MOBILE</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-shadow: 0 0 10px #00ff00; font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
        .card { background: #111; border: 1px solid #00ff00; border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,255,0,0.1); }
        input { width: 100%; box-sizing: border-box; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 15px; font-size: 1rem; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        #startBtn { background: #00ff00; color: #000; }
        #stopBtn { background: #ff0000; color: #fff; }
        .stats-box { margin-top: 25px; width: 100%; max-width: 400px; text-align: left; background: #1a1a1a; padding: 15px; border-radius: 8px; border-left: 5px solid #00ff00; }
        .stat-val { color: #fff; font-weight: bold; float: right; }
    </style>
</head>
<body>
    <div class="header"> [ CHIIP NEBULA V3 ] </div>
    <div class="card">
        <input type="text" id="targetUrl" placeholder="https://example.com" value="https://">
        <div class="btn-group">
            <button id="startBtn" onclick="toggleAttack(true)">START</button>
            <button id="stopBtn" onclick="toggleAttack(false)">STOP</button>
        </div>
    </div>
    <div class="stats-box">
        <div>FLOOD STATUS: <span id="statusLabel" class="stat-val" style="color:red">IDLE</span></div>
        <div style="margin-top:10px">REQUESTS SENT: <span id="reqCount" class="stat-val">0</span></div>
        <div style="margin-top:10px">ERRORS/BLOCKED: <span id="errCount" class="stat-val">0</span></div>
    </div>

    <script>
        let interval;
        function toggleAttack(start) {
            const url = document.getElementById('targetUrl').value;
            fetch(start ? '/start' : '/stop', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            document.getElementById('statusLabel').innerText = start ? 'ATTACKING' : 'IDLE';
            document.getElementById('statusLabel').style.color = start ? '#00ff00' : 'red';
            if(start) {
                interval = setInterval(updateStats, 1000);
            } else {
                clearInterval(interval);
            }
        }
        async function updateStats() {
            const res = await fetch('/stats');
            const data = await res.json();
            document.getElementById('reqCount').innerText = data.requests_sent;
            document.getElementById('errCount').innerText = data.errors;
        }
    </script>
</body>
</html>
